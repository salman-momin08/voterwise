name: Repository Size Check

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for accurate size
      - name: Check repo size
        run: |
          # Calculate the size of the entire repository excluding .git
          SIZE_KB=$(du -sk --exclude=.git . | cut -f1)
          SIZE_MB=$(echo "scale=2; $SIZE_KB / 1024" | bc)
          echo "Repository size: $SIZE_MB MB"
          
          # Max size: 10MB
          if (( $(echo "$SIZE_MB > 10.0" | bc -l) )); then
            echo "Error: Repository size exceeds 10MB threshold."
            exit 1
          fi
          echo "Repository size is within the 10MB limit."
